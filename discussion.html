<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>YELINHAWORLD — Discussion interne</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #050810;
    --navy: #080e1e;
    --card: #0b1224;
    --card2: #0e1630;
    --border: rgba(56,120,255,0.18);
    --border2: rgba(56,120,255,0.08);
    --blue: #3878ff;
    --blue2: #5a9fff;
    --cyan: #00d4ff;
    --gold: #f0b429;
    --green: #00e5a0;
    --red: #ff4567;
    --orange: #ff8c42;
    --text: #e8edf8;
    --text2: #8a9bc4;
    --text3: #4a5a80;
    --glow: 0 0 30px rgba(56,120,255,0.3);
    --glow2: 0 0 60px rgba(56,120,255,0.15);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--black);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 60% 40% at 20% 10%, rgba(56,120,255,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  .wrapper { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 20px; }
  
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    background: rgba(8,14,30,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    border-radius: 12px 12px 0 0;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 24px;
  }
  .logo-area { display: flex; align-items: center; gap: 12px; }
  .back-btn {
    background: rgba(56,120,255,0.15);
    border: 1px solid var(--border);
    padding: 8px 16px;
    border-radius: 30px;
    color: var(--cyan);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-decoration: none;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .back-btn:hover { background: rgba(56,120,255,0.3); border-color: var(--cyan); }
  h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    background: linear-gradient(90deg, var(--cyan), var(--blue2));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .badge {
    background: rgba(0,212,255,0.12);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--cyan);
  }
  
  .discussion-container {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    backdrop-filter: blur(4px);
  }
  .messages-area {
    height: 500px;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .message {
    display: flex;
    gap: 12px;
    animation: fadeIn 0.2s ease;
  }
  .message-avatar {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--blue), var(--cyan));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    font-weight: bold;
    flex-shrink: 0;
  }
  .message-content {
    flex: 1;
    background: var(--card2);
    padding: 10px 14px;
    border-radius: 12px;
    border-left: 2px solid var(--cyan);
  }
  .message-author {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--cyan);
    margin-bottom: 4px;
  }
  .message-text {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.5;
    word-break: break-word;
  }
  .message-time {
    font-size: 9px;
    color: var(--text3);
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
  }
  .input-area {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: rgba(8,14,30,0.6);
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }
  .input-field {
    flex: 1;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 12px 18px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    resize: none;
    outline: none;
    transition: all 0.2s;
  }
  .input-field:focus { border-color: var(--cyan); box-shadow: 0 0 8px rgba(0,212,255,0.2); }
  .send-btn {
    background: linear-gradient(135deg, var(--blue), var(--cyan));
    border: none;
    padding: 10px 20px;
    border-radius: 40px;
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: bold;
    color: white;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .send-btn:hover { transform: scale(1.02); box-shadow: var(--glow); }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
    font-size: 13px;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(56,120,255,0.3); border-radius: 4px; }
  
  @media (max-width: 600px) {
    .wrapper { padding: 12px; }
    .messages-area { height: 400px; }
    .input-area { flex-direction: column; }
    .send-btn { align-self: flex-end; }
  }
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div class="logo-area">
      <a href="index.html" class="back-btn">← Retour au centre</a>
      <h1>💬 YELINHAWORLD · DISCUSSION INTERNE</h1>
    </div>
    <div class="badge">🔒 Canal privé · Équipe programme</div>
  </div>
  
  <div class="discussion-container">
    <div class="messages-area" id="messagesArea">
      <div class="empty-state" id="emptyState">
        💡 Aucun message pour le moment.<br>Soyez le premier à écrire.
      </div>
    </div>
    <div class="input-area">
      <textarea class="input-field" id="messageInput" rows="1" placeholder="Écrivez votre message... (commandes, questions, actualités)"></textarea>
      <button class="send-btn" id="sendBtn">📨 Envoyer</button>
    </div>
  </div>
</div>

<script>
  // === GESTION DES MESSAGES (localStorage) ===
  const STORAGE_KEY = 'yelinhaworld_discussions';
  
  function loadMessages() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      try {
        return JSON.parse(stored);
      } catch(e) { return []; }
    }
    return [];
  }
  
  function saveMessages(messages) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
  }
  
  function formatTime() {
    const now = new Date();
    return now.toLocaleString('fr-FR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
  }
  
  function addMessage(author, text) {
    if (!text.trim()) return;
    const messages = loadMessages();
    messages.push({
      id: Date.now(),
      author: author,
      text: text.trim(),
      time: formatTime()
    });
    saveMessages(messages);
    renderMessages();
  }
  
  function deleteMessage(id) {
    let messages = loadMessages();
    messages = messages.filter(m => m.id !== id);
    saveMessages(messages);
    renderMessages();
  }
  
  function renderMessages() {
    const container = document.getElementById('messagesArea');
    const emptyDiv = document.getElementById('emptyState');
    const messages = loadMessages();
    
    if (!messages.length) {
      if (emptyDiv) emptyDiv.style.display = 'block';
      container.innerHTML = '<div class="empty-state" id="emptyState">💡 Aucun message pour le moment.<br>Soyez le premier à écrire.</div>';
      return;
    }
    
    container.innerHTML = '';
    messages.forEach(msg => {
      const msgDiv = document.createElement('div');
      msgDiv.className = 'message';
      msgDiv.innerHTML = `
        <div class="message-avatar">${msg.author.substring(0,2).toUpperCase()}</div>
        <div class="message-content">
          <div class="message-author">${escapeHtml(msg.author)}</div>
          <div class="message-text">${escapeHtml(msg.text).replace(/\n/g, '<br>')}</div>
          <div class="message-time">${escapeHtml(msg.time)}</div>
        </div>
      `;
      container.appendChild(msgDiv);
    });
    container.scrollTop = container.scrollHeight;
  }
  
  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }
  
  // Initialisation et événements
  document.addEventListener('DOMContentLoaded', () => {
    renderMessages();
    
    const sendBtn = document.getElementById('sendBtn');
    const input = document.getElementById('messageInput');
    
    function sendMessage() {
      const text = input.value.trim();
      if (text === '') return;
      addMessage('Membre YELINHA', text);
      input.value = '';
      input.style.height = 'auto';
    }
    
    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    
    // Auto-resize textarea
    input.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });
  });
</script>
</body>
</html>
